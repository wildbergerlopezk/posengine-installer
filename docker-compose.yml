version: '3.8'

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-posengine-postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - posengine-network
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-kevinho3324/posengine-backend:1.1.0}
    container_name: ${BACKEND_CONTAINER_NAME:-posengine-backend}
    ports:
      - "3005:3005"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3005
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - posengine-network
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    container_name: ${NGINX_CONTAINER_NAME:-posengine-nginx}
    ports:
      - "${NGINX_PORT:-3006}:80"
    volumes:
      - uploads_data:/var/www/uploads:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - posengine-network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  posengine-network:
    driver: bridge